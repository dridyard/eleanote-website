<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify email — Eleanote</title>
    <meta name="description" content="Verify your Eleanote email address.">
    <meta name="theme-color" content="#14515c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="/" aria-label="Eleanote home">
                <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
                    <circle cx="16" cy="16" r="15" fill="#14515c"/>
                    <text x="16" y="22.5" text-anchor="middle"
                        font-family="Inter, sans-serif" font-size="20" font-weight="600"
                        letter-spacing="-1" fill="#ffffff">e</text>
                </svg>
                <span class="brand-word">eleanote</span>
            </a>
            <a class="nav-back" href="/">&larr; Back to site</a>
        </nav>
    </header>

    <main>
        <div class="auth-card">
            <h1>Check your email</h1>
            <p class="subtitle">We sent a 6-digit verification code to <strong id="emailDisplay"></strong>. Enter it below to finish creating your account.</p>

            <div id="alert" class="alert"></div>

            <form id="verifyForm" novalidate>
                <div class="field field-code">
                    <label for="code">Verification code</label>
                    <input type="text" id="code" name="code" inputmode="numeric"
                        autocomplete="one-time-code" required maxlength="6"
                        pattern="[0-9]{6}" placeholder="000000">
                </div>

                <button type="submit" class="btn" id="submitBtn">Verify and continue</button>
            </form>

            <div class="auth-links">
                Didn't get the code? <a href="#" id="resendLink">Resend</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        const email = EleanoteAuth.getParam('email');
        const emailDisplay = document.getElementById('emailDisplay');
        const form = document.getElementById('verifyForm');
        const submitBtn = document.getElementById('submitBtn');
        const resendLink = document.getElementById('resendLink');

        if (!email) {
            // No email in URL — send back to signup
            window.location.href = 'signup.html';
        } else {
            emailDisplay.textContent = email;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            EleanoteAuth.hideAlert('alert');

            const code = document.getElementById('code').value.trim();
            EleanoteAuth.setButtonLoading(submitBtn, true);

            try {
                await EleanoteAuth.confirmSignUp(email, code);
                // Email verified — redirect to login with the email pre-filled
                window.location.href = `login.html?email=${encodeURIComponent(email)}&verified=1`;
            } catch (err) {
                EleanoteAuth.showAlert('alert', 'error', EleanoteAuth.friendlyError(err));
                EleanoteAuth.setButtonLoading(submitBtn, false);
            }
        });

        resendLink.addEventListener('click', async (e) => {
            e.preventDefault();
            EleanoteAuth.hideAlert('alert');
            try {
                await EleanoteAuth.resendCode(email);
                EleanoteAuth.showAlert('alert', 'success', 'A new code has been sent to your email.');
            } catch (err) {
                EleanoteAuth.showAlert('alert', 'error', EleanoteAuth.friendlyError(err));
            }
        });
    </script>
</body>
</html>
