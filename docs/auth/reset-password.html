<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password — Eleanote</title>
    <meta name="theme-color" content="#14515c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="/" aria-label="Eleanote home">
                <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
                    <circle cx="16" cy="16" r="15" fill="#14515c"/>
                    <text x="16" y="22.5" text-anchor="middle"
                        font-family="Inter, sans-serif" font-size="20" font-weight="600"
                        letter-spacing="-1" fill="#ffffff">e</text>
                </svg>
                <span class="brand-word">eleanote</span>
            </a>
            <a class="nav-back" href="/">&larr; Back to site</a>
        </nav>
    </header>

    <main>
        <div class="auth-card">
            <h1>Set new password</h1>
            <p class="subtitle">We sent a code to <strong id="emailDisplay"></strong>. Enter it below along with your new password.</p>

            <div id="alert" class="alert"></div>

            <form id="resetForm" novalidate>
                <div class="field field-code">
                    <label for="code">Reset code</label>
                    <input type="text" id="code" name="code" inputmode="numeric"
                        autocomplete="one-time-code" required maxlength="6"
                        pattern="[0-9]{6}" placeholder="000000">
                </div>
                <div class="field">
                    <label for="password">New password</label>
                    <input type="password" id="password" name="password" required
                        autocomplete="new-password" minlength="8">
                    <div class="field-hint">
                        At least 8 characters with uppercase, lowercase, number, and a symbol.
                    </div>
                </div>
                <div class="field">
                    <label for="passwordConfirm">Confirm new password</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" required
                        autocomplete="new-password" minlength="8">
                </div>

                <button type="submit" class="btn" id="submitBtn">Set new password</button>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        const email = EleanoteAuth.getParam('email');
        const emailDisplay = document.getElementById('emailDisplay');
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');

        if (!email) {
            window.location.href = 'forgot-password.html';
        } else {
            emailDisplay.textContent = email;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            EleanoteAuth.hideAlert('alert');

            const code = document.getElementById('code').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            if (password !== passwordConfirm) {
                EleanoteAuth.showAlert('alert', 'error', 'Passwords do not match.');
                return;
            }

            EleanoteAuth.setButtonLoading(submitBtn, true);

            try {
                await EleanoteAuth.confirmForgotPassword(email, code, password);
                window.location.href = `login.html?email=${encodeURIComponent(email)}&reset=1`;
            } catch (err) {
                EleanoteAuth.showAlert('alert', 'error', EleanoteAuth.friendlyError(err));
                EleanoteAuth.setButtonLoading(submitBtn, false);
            }
        });
    </script>
</body>
</html>
